<!DOCTYPE html>
<html>
<head>
  <title>To-Do App</title>
  <style>
    body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen;
  background-color: #f4f6f8;

  display: flex;              /* makes the body a flex container */
  justify-content: center;    /* centers container horizontally */
  align-items: center;        /* centers container vertically */
  height: 100vh;              /* full viewport height */
  margin: 0;
}

.container {
  background: white;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  width: 420px;
  max-width: 420px;
}

h1 {
  margin-top: 0;
  text-align: center;
}

.input-group {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.input-group input {
  flex: 1;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #ddd;
  font-size: 14px;
  width: 100%;
  box-sizing: border-box;
}

button {
  padding: 8px 12px;
  border-radius: 6px;
  border: none;
  background-color: #4f46e5;
  color: white;
  cursor: pointer;
  transition: transform 0.1s ease, background-color 0.2s ease;
}

button:hover {
  background-color: #4338ca;
  transform: translateY(-1px);
}

.filters {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 15px;
  flex-wrap: wrap;
}

.filters button {
  padding: 6px 12px;
  font-size: 14px;
}

.filters button:hover {
  background-color: #c7d2fe;
}

li {
  padding: 10px;
  margin-bottom: 8px;
  background: #f1f3f5;
  border-radius: 6px;

  display: flex;
  justify-content: space-between;
  align-items: center;
}

li span {
  flex: 1;
}
li span {
  cursor: pointer;
}
li:hover {
  background: #e9ecef;
}

li button {
  background: transparent;
  border: none;
  cursor: pointer;
  font-size: 16px;
}
.completed {
  text-decoration: line-through;
  opacity: 0.6;

}
ul {
  list-style: none;
  padding: 0;
  margin: 20px auto;
  max-width: 320px;
}


  </style>
</head>
<script src="script.js"></script>
<body>

  <div class="container">

  <h1>My To-Do List</h1>

  <div class="input-group">
    <input type="text" id="taskInput" placeholder="Enter a task">
    <button id="addBtn">Add</button>
  </div>

  <div class="filters">
    <button id="allBtn">All</button>
    <button id="activeBtn">Active</button>
    <button id="completedBtn">Completed</button>
  </div>

  <ul id="taskList"></ul>

</div>

</div>
</body>
</html>
